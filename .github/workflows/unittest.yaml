name: unit-test

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [next, qa, main]
    tags: ['v*']

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: prefix-dev/setup-pixi@v0.8.8
        with:
          pixi-version: v0.41.4
          manifest-path: pyproject.toml
      - name: Apt install deps
        run: |
          sudo apt update
          sudo apt-get install xvfb
      - name: Start xvfb daemon
        run: |
          /sbin/start-stop-daemon --start --quiet --pidfile /tmp/custom_xvfb_99.pid --make-pidfile --background --exec /usr/bin/Xvfb -- :99 -ac -screen 0 1280x1024x16
      - name: run unit tests
        run: |
          echo "running unit tests"
          xvfb-run --server-args="-screen 0 1280x1024x16" -a pixi run test
      - name: upload coverage to codecov
        uses: codecov/codecov-action@v5
        if: github.actor != 'dependabot[bot]'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    runs-on: snapred-builder
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
        lfs: true
    - uses: prefix-dev/setup-pixi@v0.8.8
      with:
          pixi-version: v0.41.4
          manifest-path: pyproject.toml
    - name: DNF install deps
      run: |
        sudo dnf makecache --refresh
        sudo yum -y install xorg-x11-server-Xvfb
    - name: Test with pytest
      run: |
        env=tests/resources/integration_test xvfb-run --server-args="-screen 0 1280x1024x16" -a pixi run pytest -m integration
    - name: Upload coverage reports
      uses: codecov/codecov-action@v5
      if:
        github.actor != 'dependabot[bot]'
      with:
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}

  gui-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: prefix-dev/setup-pixi@v0.8.8
      with:
          pixi-version: v0.41.4
          manifest-path: pyproject.toml
    - name: Apt install deps
      run: |
        sudo apt update
        sudo apt-get install xvfb
    - name: Start xvfb daemon
      run: |
        /sbin/start-stop-daemon --start --quiet --pidfile /tmp/custom_xvfb_99.pid --make-pidfile --background --exec /usr/bin/Xvfb -- :99 -ac -screen 0 1280x1024x16
    - name: Gui tests
      run: |
        env=tests/resources/headcheck.yml xvfb-run --server-args="-screen 0 1280x1024x16" --auto-servernum pixi run snapred --headcheck
